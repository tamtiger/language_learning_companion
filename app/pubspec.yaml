name: language_learning_companion
description: "Language Learning Companion - Learn English with structured curriculum"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  sqflite: ^2.4.1
  path: ^1.9.1
  path_provider: ^2.1.5
  flutter_markdown: ^0.7.6
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/curriculum_manifest.json
    - assets/lessons/
